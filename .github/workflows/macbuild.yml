name: Build macOS app

on:
  workflow_dispatch:        # запуск вручную из вкладки Actions
  push:
    branches: [ main ]

jobs:
  build:
    # ARM-раннер -> нативный arm64-бандл под M-чипы. Запускаем игру (client.swf)
    # напрямую, без HTML-обёртки, поэтому мёртвый WebKit/HTMLLoader не нужен.
    runs-on: macos-14
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Setup AIR SDK (HARMAN)
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "33.1.1.743"   # последняя версия с живым WebKit/HTMLLoader
          accept-license: true

      - name: Prepare AIR app (fetch game + patch descriptor)
        run: |
          chmod +x prepare.sh
          ./prepare.sh

      - name: Generate self-signed certificate
        run: |
          "$AIR_HOME/bin/adt" -certificate -cn "TSO" -validityPeriod 25 2048-RSA cert.p12 "tsopass"

      - name: Package native macOS bundle (.app)
        run: |
          mkdir -p build
          "$AIR_HOME/bin/adt" -package \
            -storetype pkcs12 -keystore cert.p12 -storepass "tsopass" \
            -target bundle \
            build/TSO.app \
            staging/application.xml \
            -C staging .
          echo "==> bundle built."

      - name: Diagnose WebKit + force x86_64 (Rosetta)
        run: |
          APP=build/TSO.app
          echo "===== WebKit in bundle (HTMLLoader engine) ====="
          find "$APP" -iname "*webkit*" 2>/dev/null | head -20 || echo "NO WEBKIT"
          echo "===== Mach-O archs (before) ====="
          find "$APP/Contents" -type f | while read f; do
            file "$f" | grep -q "Mach-O" && echo "$f -> $(lipo -info "$f" 2>/dev/null | sed 's/.*://')"
          done | head -40
          echo "===== force x86_64 (strip arm64 from any universal Mach-O) ====="
          find "$APP/Contents" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              a=$(lipo -info "$f" 2>/dev/null)
              echo "$a" | grep -q "arm64" && echo "$a" | grep -q "x86_64" && lipo "$f" -remove arm64 -output "$f" 2>/dev/null && echo "stripped: $f"
            fi
          done
          echo "===== main executable arch (after) ====="
          find "$APP/Contents/MacOS" -type f -exec sh -c 'file "$1" | grep -q Mach-O && echo "$1 -> $(lipo -info "$1" 2>/dev/null | sed "s/.*://")"' _ {} \;
          codesign --force --deep -s - "$APP" 2>&1 | tail -1 || true

      - name: Build DMG
        run: |
          hdiutil create -volname "The Settlers Online" \
            -srcfolder build/TSO.app -ov -format UDZO TSO-macOS.dmg
          ls -la TSO-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TSO-macOS
          path: TSO-macOS.dmg
          retention-days: 14
